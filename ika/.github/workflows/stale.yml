name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: -1
          exempt-all-milestones: true
          exempt-all-assignees: true
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will not be closed automatically, but it may be
            prioritized lower. Please update the issue if it is still relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had recent activity. It will not be closed automatically, but it may
            be prioritized lower. Please update if it is still relevant.
          stale-issue-label: "stale"
          stale-pr-label: "stale"
