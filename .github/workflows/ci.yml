name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --manifest-path programs/bov/Cargo.toml
        env:
          RUSTFLAGS: "-D warnings"

  node:
    name: SDK typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @bov/sdk build
